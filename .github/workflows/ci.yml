name: Build SnowReports

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build-maven:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml